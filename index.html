<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TineYinSay</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="top-bar">
            <h2 id="pageTitle">တိုင်းရင်းဆေး</h2>
        </div>
    </header>

    <main id="mainContent">
        <section id="home" class="page">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="ရောဂါအမည် သို့မဟုတ် ဆေးအမည်..." oninput="searchData()">
            </div>
            <div id="results" class="results-list"></div>
        </section>

        <section id="recent" class="page" style="display:none;">
            <div id="recentList" class="results-list"></div>
        </section>

        <section id="about" class="page" style="display:none;">
            <div class="about-section">
                <div class="app-logo">🌿</div>
                <h3>တိုင်းရင်းဆေး</h3>
                <p>မြန်မာတိုင်းရင်းဆေးပညာ လေ့လာသူများအတွက် ရည်ရွယ်ပါသည်။ဆေးနည်း၁၀၀၀ တိုင်းရင်းမြန်မာအိမ်သုံးဆေးများစာအုပ်မှ
                ဆေးနည်းများကို Gemini(AI)အကူအညီဖြင့် ကောက်နုတ်ဖော်ပြထားခြင်းဖြစ်ပါသည်။</p>
            </div>
        </section>
    </main>

    <div id="detailModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle"></h2>
            <hr>
            <p id="modalBody"></p>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" id="nav-home" onclick="showPage('home', 'တိုင်းရင်းဆေး')">
            <span class="icon">🏠</span>
            <span>Home</span>
        </div>
        <div class="nav-item" id="nav-recent" onclick="showPage('recent', 'မကြာသေးမီက')">
            <span class="icon">🕒</span>
            <span>Recent</span>
        </div>
        <div class="nav-item" id="nav-about" onclick="showPage('about', 'အကြောင်းအရာ')">
            <span class="icon">ℹ️</span>
            <span>About</span>
        </div>
    </nav>

    <script src="app.js"></script>
</body>
</html>
